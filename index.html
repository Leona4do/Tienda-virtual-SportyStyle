<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportyStyle - Tienda Deportiva</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
</head>
<body>

  <!-- BARRA DE NAVEGACION -->
  <nav class="navbar">
    <div class="logo">SportyStyle</div>
    <div class="nav-actions">
      <span id="welcome-msg"></span>
      <button id="btn-login" onclick="loginUser()">Iniciar Sesion</button>
      <button id="btn-logout" onclick="logoutUser()" style="display:none">Cerrar Sesion</button>
      <button class="cart-btn" onclick="toggleCart()">🛒 Carrito (<span id="cart-count">0</span>)</button>
    </div>
  </nav>

  <!-- SECCION DE PRODUCTOS -->
  <main id="main-content">
    <section id="products-section">
      <h2 class="section-title">Nuestros Productos</h2>
      <div id="products-container"></div>
    </section>

    <!-- PANEL DEL CARRITO -->
    <aside id="cart-panel" style="display:none">
      <h3>🛒 Mi Carrito</h3>
      <div id="cart-items"></div>
      <hr>
      <p class="cart-total">Total: <strong>$<span id="cart-total">0</span></strong></p>
      <button class="btn-primary" onclick="goToCheckout()">Ir al Pago</button>
      <button class="btn-secondary" onclick="toggleCart()">Seguir Comprando</button>
    </aside>
  </main>

  <!-- FORMULARIO DE PAGO -->
  <section id="checkout-section" style="display:none">
    <div class="form-container">
      <h2>Datos de Envio y Pago</h2>
      <div id="cart-summary-checkout"></div>
      <hr>
      <h3>Completa tus datos:</h3>
      <input type="text"  id="full-name" placeholder="Nombre completo *">
      <input type="text"  id="address"   placeholder="Direccion de envio *">
      <input type="email" id="email"     placeholder="Correo electronico * (ej: usuario@gmail.com)">
      <input type="tel"   id="phone"     placeholder="Telefono * (ej: 912345678)">
      <p class="form-note">* Todos los campos son obligatorios</p>
      <button class="btn-primary"   onclick="processPayment()">Confirmar Compra</button>
      <button class="btn-secondary" onclick="backToProducts()">Volver</button>
    </div>
  </section>

  <!-- PANTALLA DE CONFIRMACION -->
  <section id="confirmation-section" style="display:none">
    <div class="confirmation-container">
      <div class="check-icon">&#10003;</div>
      <h2>¡Gracias por tu compra!</h2>
      <p>Tu pedido fue registrado correctamente.</p>
      <div id="order-details"></div>
      <button class="btn-primary" onclick="backToProducts()">Volver a la Tienda</button>
    </div>
  </section>

  <div id="toast" class="toast"></div>

  <script src="js/auth.js"></script>
  <script src="js/products.js"></script>
  <script src="js/checkout.js"></script>
</body>
</html>
